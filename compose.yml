services:
  ip.8080.li:
    container_name: ip.8080.li
    image: ip.8080.li:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./.data/db:/app/.data/db

networks:
  default:
    name: cloudflare
    external: true
